name: CI Pipeline

on:
  pull_request:
    branches: [main]

  push:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_NAME: varunp100288

jobs:

  # 🔍 PR VALIDATION
  pr-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [catalog, cart, checkout, orders, ui]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t ${{ matrix.service }} ./src/${{ matrix.service }}

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.service }}
          format: table
          output: trivy-report.txt
          exit-code: 0
          severity: HIGH,CRITICAL

      - name: Upload Trivy Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ matrix.service }}
          path: trivy-report.txt


  # 🚀 MAIN PIPELINE
  build-and-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [catalog, cart, checkout, orders, ui]

    steps:
      - uses: actions/checkout@v4

      # ⚡ Cache
      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}

      - name: Cache Node
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: node-${{ hashFiles('**/package-lock.json') }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # 🔍 Detect project type
      - name: Detect Project Type
        id: detect
        run: |
          cd src/${{ matrix.service }}

          if [ -f "pom.xml" ]; then
            echo "type=maven" >> $GITHUB_OUTPUT
          elif [ -f "package.json" ]; then
            echo "type=node" >> $GITHUB_OUTPUT
          else
            echo "type=unknown" >> $GITHUB_OUTPUT
          fi

      # ☕ Maven Build
      - name: Build (Maven)
        if: steps.detect.outputs.type == 'maven'
        run: |
          cd src/${{ matrix.service }}
          mvn clean install -DskipTests

      # 🌐 Node Build (UI)
      - name: Build (Node)
        if: steps.detect.outputs.type == 'node'
        run: |
          cd src/${{ matrix.service }}
          npm install
          npm run build || true

      # 🐳 Build Docker
      - name: Build Image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ github.sha }} ./src/${{ matrix.service }}

      # 📤 Push Image
      - name: Push Image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ github.sha }}

      - name: Tag as latest
        run: |
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ github.sha }} \
                     ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:latest

      # 🔎 Trivy (NO FAIL)
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ github.sha }}
          format: table
          output: trivy-report.txt
          exit-code: 0
          severity: HIGH,CRITICAL

      - name: Upload Trivy Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ matrix.service }}
          path: trivy-report.txt