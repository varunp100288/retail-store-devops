name: CI Pipeline

on:
  pull_request:
    branches: [main]

  push:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_NAME: varunp100288

jobs:

  # 🔍 PR VALIDATION
  pr-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [catalog, cart, checkout, orders, ui]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t ${{ matrix.service }} ./src/${{ matrix.service }}

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.service }}
          format: table
          output: trivy-report.txt
          exit-code: 0
          severity: HIGH,CRITICAL

      - name: Upload Trivy Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ matrix.service }}
          path: trivy-report.txt


  # 🚀 MAIN PIPELINE
  build-and-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [catalog, cart, checkout, orders, ui]

    steps:
      - uses: actions/checkout@v4

      # ⚡ Cache
      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}

      - name: Cache Node
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: node-${{ hashFiles('**/package-lock.json') }}

      - name: Cache Sonar
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: sonar-cache

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ github.sha }} ./src/${{ matrix.service }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # ✅ Correct Sonar URL everywhere
      - name: Check Sonar Connectivity
        run: |
          curl -I http://unprovidential-multilaminate-augusta.ngrok-free.dev

      - name: Test Sonar Auth
        run: |
          curl -u ${{ secrets.SONAR_TOKEN_ORDERS_P }}: \
          http://unprovidential-multilaminate-augusta.ngrok-free.dev/api/authentication/validate

      # 🔍 Detect project type
      - name: Detect Project Type
        id: detect
        run: |
          cd src/${{ matrix.service }}

          if [ -f "pom.xml" ]; then
            echo "type=maven" >> $GITHUB_OUTPUT
          elif [ -f "package.json" ]; then
            echo "type=node" >> $GITHUB_OUTPUT
          elif [ -f "requirements.txt" ]; then
            echo "type=python" >> $GITHUB_OUTPUT
          elif [ -f "go.mod" ]; then
            echo "type=go" >> $GITHUB_OUTPUT
          else
            echo "type=unknown" >> $GITHUB_OUTPUT
          fi

      - name: Print detected type
        run: echo "${{ matrix.service }} is ${{ steps.detect.outputs.type }}"

      # ☕ Maven Sonar
      - name: Sonar Scan (Maven)
        if: steps.detect.outputs.type == 'maven'
        run: |
          cd src/${{ matrix.service }}
          mvn clean verify -DskipTests sonar:sonar \
            -Dsonar.projectKey=${{ matrix.service }} \
            -Dsonar.host.url=https://unprovidential-multilaminate-augusta.ngrok-free.dev \
            -Dsonar.login=${{ secrets.SONAR_TOKEN_ORDERS_P }}

      # 🌐 Install scanner
      - name: Install Sonar Scanner
        if: steps.detect.outputs.type != 'maven' && steps.detect.outputs.type != 'unknown'
        run: npm install -g sonar-scanner

      # 🐹 Go Tests (optional)
      - name: Run Go Tests
        if: steps.detect.outputs.type == 'go'
        run: |
          cd src/${{ matrix.service }}
          go test ./... -coverprofile=coverage.out || true

      # 🌐 Non-Maven Sonar
      - name: Sonar Scan (Non-Maven)
        if: steps.detect.outputs.type != 'maven' && steps.detect.outputs.type != 'unknown'
        run: |
          cd src/${{ matrix.service }}
          sonar-scanner \
            -Dsonar.projectKey=${{ matrix.service }} \
            -Dsonar.sources=. \
            -Dsonar.host.url=http://unprovidential-multilaminate-augusta.ngrok-free.dev \
            -Dsonar.login=${{ secrets.SONAR_TOKEN_ORDERS_P }} \
            -Dsonar.go.coverage.reportPaths=coverage.out || true

      - name: Push Image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ github.sha }}

      - name: Tag as latest
        run: |
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ github.sha }} \
                     ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:latest

      # 🔎 Trivy (NO FAIL)
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ github.sha }}
          format: table
          output: trivy-report.txt
          exit-code: 0
          severity: HIGH,CRITICAL

      - name: Upload Trivy Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ matrix.service }}
          path: trivy-report.txt