#updated code with matrix strategy to build and push the images to dockerhub 

name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service: [catalog, cart, checkout, orders, ui]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set image tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 🔨 Build Image
      - name: Build Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}-service:${{ env.TAG }} ./src/${{ matrix.service }}

      # 🔍 Trivy Scan (JSON report)
      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@v0.19.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}-service:${{ env.TAG }}
          format: json
          output: trivy-${{ matrix.service }}.json
          severity: CRITICAL,HIGH
          exit-code: 0

      # 📁 Upload Trivy Report
      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ matrix.service }}
          path: trivy-${{ matrix.service }}.json

      # 🚀 Push Image
      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}-service:${{ env.TAG }}