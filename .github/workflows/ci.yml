# now no push on pull request and only build and scan the images and upload the trivy report as artifact and on push to main branch it will build scan and push the images to dockerhub

name: CI Pipeline

on:
  pull_request:
    branches: [main]

  push:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_NAME: varunp100288

jobs:

  # 🔍 PR VALIDATION JOB (NO PUSH)
  pr-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [orders-service, catalog-service, ui-service, checkout-service, cart-service]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image (No Push)
        run: |
          docker build -t ${{ matrix.service }} ./src/${{ matrix.service }}

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.service }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

---

  # 🚀 MAIN BRANCH CI (BUILD + PUSH)
  build-and-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [orders-service, catalog-service, ui-service, checkout-service, cart-service]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Docker Login
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Image
        run: |
          docker build -t $REGISTRY/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ github.sha }} ./src/${{ matrix.service }}

      - name: Push Image
        run: |
          docker push $REGISTRY/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ github.sha }}

      - name: Tag as latest
        run: |
          docker tag $REGISTRY/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ github.sha }} \
                     $REGISTRY/${{ env.IMAGE_NAME }}/${{ matrix.service }}:latest
          docker push $REGISTRY/${{ env.IMAGE_NAME }}/${{ matrix.service }}:latest

      - name: Run Trivy Scan (Post Push)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: $REGISTRY/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL